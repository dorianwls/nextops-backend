services:
   nextops-api:
      # Usamos la imagen oficial del SDK de .NET 10 para tener todas las herramientas de desarrollo
      image: mcr.microsoft.com/dotnet/sdk:10.0
      ports:
         - "5000:8080" # .NET 8+ usa el puerto 8080 por defecto
      environment:
         - ASPNETCORE_ENVIRONMENT=Development
         # Le pasamos la cadena de conexión directamente como variable de entorno
         - ConnectionStrings__DefaultConnection=Host=db;Database=nextops_db;Username=postgres;Password=TuPasswordSeguro123
      volumes:
         # Montamos toda la carpeta raíz (.) en lugar de solo la API, 
         # para que VS Code pueda ver tus capas de Core e Infraestructura
         - .:/workspace:cached
      working_dir: /workspace
      # Este comando es vital: mantiene el contenedor encendido y en espera 
      # para que VS Code se pueda conectar a él.
      command: sleep infinity
      depends_on:
         - db

   db:
      image: postgres:16-alpine
      restart: unless-stopped
      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: Admin123!
         POSTGRES_DB: nextops_db
      ports:
         - "5432:5432"
      volumes:
         # Guardamos los datos de Postgres en un volumen para no perderlos si apagas el contenedor
         - postgres_data:/var/lib/postgresql/data

volumes:
   postgres_data: